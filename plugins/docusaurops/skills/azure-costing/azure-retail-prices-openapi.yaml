openapi: 3.0.3
info:
  title: Azure Retail Prices API
  description: |
    The Azure Retail Prices API provides retail prices for all Azure services.
    This API is **unauthenticated** — no API key or Azure credentials are required.

    **Documentation:** https://learn.microsoft.com/en-us/rest/api/cost-management/retail-prices/azure-retail-prices

    **Key behaviors:**
    - Returns a maximum of **100 items per page**. Use `NextPageLink` to paginate.
    - Supports OData `$filter` expressions for filtering results.
    - Default currency is `USD`. Use `currencyCode` parameter to change.
    - Prices are based on **retail (pay-as-you-go)** rates, not EA/CSP/MCA pricing.
    - Prices are updated regularly and reflect the latest published rates.
  version: '2023-01-01-preview'
  contact:
    name: Microsoft Azure
    url: https://learn.microsoft.com/en-us/rest/api/cost-management/retail-prices/azure-retail-prices

servers:
  - url: https://prices.azure.com
    description: Azure Retail Prices (Global)

paths:
  /api/retail/prices:
    get:
      operationId: getRetailPrices
      summary: Get Azure retail prices
      description: |
        Returns retail prices for Azure services. Use OData `$filter` to narrow results
        by service name, region, SKU, meter, pricing type, etc.

        **Filterable fields for `$filter`:**
        - `armRegionName` — Azure region (e.g., `canadacentral`, `eastus`, `westeurope`)
        - `serviceName` — Azure service (e.g., `Virtual Machines`, `App Service`, `Azure Cosmos DB`)
        - `serviceFamily` — Service category (e.g., `Compute`, `Storage`, `Databases`, `AI + Machine Learning`)
        - `productName` — Product name (e.g., `App Service Premium v3 Plan - Linux`)
        - `skuName` — SKU (e.g., `P0v3`, `S1`, `Basic`)
        - `armSkuName` — ARM SKU name (e.g., `P0v3`, `Standard_D2s_v3`)
        - `meterName` — Billing meter name (e.g., `P0v3`, `1M Transactions`)
        - `priceType` — Pricing type: `Consumption`, `Reservation`, `DevTestConsumption`
        - `type` — Same as `priceType`
        - `currencyCode` — Currency code (e.g., `USD`, `CAD`, `EUR`)
        - `tierMinimumUnits` — Tier minimum units for tiered pricing
        - `retailPrice` — Retail price (numeric comparison)
        - `isPrimaryMeterRegion` — Boolean, filters to primary meter region only

        **OData operators:** `eq`, `ne`, `lt`, `gt`, `le`, `ge`, `and`, `or`, `contains(field, 'value')`

        **Filter examples:**
        - `serviceName eq 'Virtual Machines' and armRegionName eq 'canadacentral'`
        - `productName eq 'App Service Premium v3 Plan - Linux' and armRegionName eq 'canadacentral' and priceType eq 'Consumption'`
        - `serviceName eq 'Azure Cosmos DB' and armRegionName eq 'canadacentral'`
        - `contains(productName, 'Key Vault') and armRegionName eq 'canadacentral'`
        - `serviceName eq 'Azure AI Search' and armRegionName eq 'canadacentral' and skuName eq 'Basic'`
        - `serviceName eq 'Storage' and armRegionName eq 'canadacentral' and contains(skuName, 'LRS')`
      parameters:
        - name: api-version
          in: query
          description: |
            API version to use. The latest preview version is `2023-01-01-preview`.
            If omitted, defaults to the latest stable version.
          required: false
          schema:
            type: string
            default: '2023-01-01-preview'
            enum:
              - '2023-01-01-preview'
              - '2021-10-01-preview'

        - name: currencyCode
          in: query
          description: |
            ISO 4217 currency code for prices. Defaults to `USD` if not specified.
            Supported currencies include: `USD`, `CAD`, `EUR`, `GBP`, `AUD`, `JPY`,
            `INR`, `BRL`, `CHF`, `SEK`, `NOK`, `DKK`, `KRW`, `NZD`, `MXN`, `TWD`, `ZAR`, etc.
          required: false
          schema:
            type: string
            default: USD
            example: CAD

        - name: $filter
          in: query
          description: |
            OData filter expression to narrow results. Multiple conditions can be
            combined with `and`/`or`. String values must be enclosed in single quotes.

            **Common patterns:**
            - Single service in a region: `serviceName eq 'App Service' and armRegionName eq 'canadacentral'`
            - Specific SKU: `productName eq 'App Service Premium v3 Plan - Linux' and skuName eq 'P0v3'`
            - Text search: `contains(meterName, 'Private Endpoint')`
            - Consumption only: `priceType eq 'Consumption'`
            - Combined: `serviceName eq 'Azure Cosmos DB' and armRegionName eq 'canadacentral' and priceType eq 'Consumption'`
          required: false
          schema:
            type: string
          examples:
            appServiceLinux:
              summary: App Service Premium v3 (Linux) in Canada Central
              value: "productName eq 'App Service Premium v3 Plan - Linux' and armRegionName eq 'canadacentral' and priceType eq 'Consumption'"
            cosmosDb:
              summary: Cosmos DB in Canada Central
              value: "serviceName eq 'Azure Cosmos DB' and armRegionName eq 'canadacentral' and priceType eq 'Consumption'"
            aiSearch:
              summary: AI Search Basic in Canada Central
              value: "serviceName eq 'Azure Cognitive Search' and armRegionName eq 'canadacentral' and skuName eq 'Basic'"
            keyVault:
              summary: Key Vault Premium in Canada Central
              value: "serviceName eq 'Key Vault' and armRegionName eq 'canadacentral' and skuName eq 'Premium'"
            privateEndpoints:
              summary: Private Endpoints in Canada Central
              value: "productName eq 'Virtual Network Private Link' and armRegionName eq 'canadacentral'"
            storage:
              summary: Storage Standard LRS Block Blob in Canada Central
              value: "serviceName eq 'Storage' and armRegionName eq 'canadacentral' and skuName eq 'Standard LRS' and productName eq 'General Block Blob'"
            botService:
              summary: Bot Service S1 (global pricing)
              value: "serviceName eq 'Azure Bot Service' and skuName eq 'S1' and priceType eq 'Consumption'"
            logAnalytics:
              summary: Log Analytics data ingestion in Canada Central
              value: "serviceName eq 'Log Analytics' and armRegionName eq 'canadacentral' and priceType eq 'Consumption'"
            cognitiveSearch:
              summary: Azure AI Search (Cognitive Search) in Canada Central
              value: "serviceName eq 'Azure Cognitive Search' and armRegionName eq 'canadacentral' and priceType eq 'Consumption'"

        - name: $skip
          in: query
          description: |
            Number of records to skip for pagination. The API returns a maximum of
            **100 items per request**. Use the `NextPageLink` from the response to
            get the next page, or manually set `$skip` in increments of 100.
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
            example: 100

      responses:
        '200':
          description: Successful response containing retail price items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetailPricesResponse'
              examples:
                appServiceP0v3:
                  summary: App Service P0v3 Linux — Canada Central (CAD)
                  value:
                    BillingCurrency: "CAD"
                    CustomerEntityId: "Default"
                    CustomerEntityType: "Retail"
                    Items:
                      - currencyCode: "CAD"
                        tierMinimumUnits: 0.0
                        retailPrice: 0.1149
                        unitPrice: 0.1149
                        armRegionName: "canadacentral"
                        location: "CA Central"
                        effectiveStartDate: "2024-08-01T00:00:00Z"
                        meterId: "dfc98ede-c33f-51bb-ab7a-d5f68263927b"
                        meterName: "P0v3 App"
                        productId: "DZH318Z0DCR6"
                        skuId: "DZH318Z0DCR6/00R1"
                        productName: "Azure App Service Premium v3 Plan - Linux"
                        skuName: "P0v3"
                        serviceName: "Azure App Service"
                        serviceId: "DZH317GT8G5N"
                        serviceFamily: "Compute"
                        unitOfMeasure: "1 Hour"
                        type: "Consumption"
                        isPrimaryMeterRegion: true
                        armSkuName: "Azure_App_Service_Premium_v3_Plan_Linux_P0_v3"
                    NextPageLink: null
                    Count: 1
                aiSearchBasic:
                  summary: AI Search Basic — Canada Central (CAD)
                  value:
                    BillingCurrency: "CAD"
                    CustomerEntityId: "Default"
                    CustomerEntityType: "Retail"
                    Items:
                      - currencyCode: "CAD"
                        tierMinimumUnits: 0.0
                        retailPrice: 0.1382

components:
  schemas:
    RetailPricesResponse:
      type: object
      description: Response containing a page of retail price items
      required:
        - BillingCurrency
        - CustomerEntityId
        - CustomerEntityType
        - Items
        - Count
      properties:
        BillingCurrency:
          type: string
          description: |
            The ISO 4217 currency code used for all prices in this response.
            Matches the `currencyCode` query parameter (default `USD`).
          example: "CAD"
        CustomerEntityId:
          type: string
          description: |
            The customer entity identifier. Always `Default` for retail prices.
          example: "Default"
        CustomerEntityType:
          type: string
          description: |
            The customer entity type. Always `Retail` for the retail prices API.
          example: "Retail"
        Items:
          type: array
          description: |
            Array of price items matching the filter criteria.
            Maximum **100 items per page**. Use `NextPageLink` for pagination.
          items:
            $ref: '#/components/schemas/PriceItem'
        NextPageLink:
          type: string
          nullable: true
          description: |
            URL to fetch the next page of results. `null` when there are no more pages.
            The URL includes all original query parameters plus an updated `$skip` value.
          example: "https://prices.azure.com/api/retail/prices?$skip=100&currencyCode=CAD&$filter=serviceName%20eq%20%27App%20Service%27"
        Count:
          type: integer
          description: |
            Number of items in the current page (not the total result count).
            Maximum value is 100.
          example: 100

    PriceItem:
      type: object
      description: A single Azure retail price entry
      required:
        - currencyCode
        - retailPrice
        - unitPrice
        - serviceName
        - productName
        - skuName
        - meterName
        - unitOfMeasure
        - type
      properties:
        currencyCode:
          type: string
          description: ISO 4217 currency code for this price entry
          example: "CAD"
        tierMinimumUnits:
          type: number
          format: double
          description: |
            Minimum number of units for this pricing tier. For non-tiered pricing
            this is `0.0`. For tiered pricing (e.g., storage), this indicates the
            start of the tier (e.g., `0`, `51200`, `512000` for different GB tiers).
          example: 0.0
        retailPrice:
          type: number
          format: double
          description: |
            The retail (pay-as-you-go) price per unit of measure. This is the list
            price without any discounts (no EA, CSP, or Reserved Instance pricing).
          example: 0.1149
        unitPrice:
          type: number
          format: double
          description: |
            The unit price. For retail/consumption, this equals `retailPrice`.
            For reservations, this may differ from the retail price.
          example: 0.1149
        armRegionName:
          type: string
          description: |
            The Azure Resource Manager region name where this price applies.
            Empty string for global/non-regional services (e.g., Bot Service).
            Common values: `canadacentral`, `canadaeast`, `eastus`, `eastus2`,
            `westus`, `westeurope`, `northeurope`, `uksouth`, `Global`.
          example: "canadacentral"
        location:
          type: string
          description: Display name of the Azure region
          example: "CA Central"
        effectiveStartDate:
          type: string
          format: date-time
          description: |
            The date when this price became effective. Format: ISO 8601.
            Useful for tracking price changes over time.
          example: "2024-08-01T00:00:00Z"
        meterId:
          type: string
          format: uuid
          description: |
            Unique GUID identifier for the billing meter. Maps to the meter ID
            in Azure Cost Management and usage records.
          example: "dfc98ede-c33f-51bb-ab7a-d5f68263927b"
        meterName:
          type: string
          description: |
            Display name of the billing meter. Describes what is being measured.
            Examples: `P0v3 App`, `Basic Unit`, `100 RU/s`, `Operations`,
            `S1 Premium Channel Messages`, `Analytics Logs Data Ingestion`,
            `LRS Data Stored`, `Private Endpoint`.
          example: "P0v3 App"
        productId:
          type: string
          description: Unique identifier for the Azure product
          example: "DZH318Z0DCR6"
        skuId:
          type: string
          description: |
            Unique identifier for the specific SKU within the product.
            Format is typically `{productId}/{variant}`.
          example: "DZH318Z0DCR6/00R1"
        productName:
          type: string
          description: |
            Full display name of the Azure product. This is the most descriptive
            field for identifying what the price applies to.
            Examples: `Azure App Service Premium v3 Plan - Linux`,
            `Azure AI Search`, `Azure Cosmos DB`, `Key Vault`,
            `General Block Blob`, `Virtual Network Private Link`.
          example: "Azure App Service Premium v3 Plan - Linux"
        skuName:
          type: string
          description: |
            Name of the SKU/tier. Matches the SKU defined in ARM/Bicep templates.
            Examples: `P0v3`, `Basic`, `Standard`, `Premium`, `S1`, `F0`,
            `Standard LRS`, `RUs`, `Pay-as-you-go`.
          example: "P0v3"
        serviceName:
          type: string
          description: |
            Name of the Azure service. Common values:
            - `Azure App Service` — Web apps, function apps
            - `Azure Cosmos DB` — NoSQL database
            - `Azure Cognitive Search` — AI Search (note: service name uses legacy "Cognitive Search")
            - `Key Vault` — Secrets, keys, certificates
            - `Storage` — Blob, file, queue, table storage
            - `Azure Bot Service` — Bot Framework
            - `Azure Private Link` — Private endpoints
            - `Log Analytics` — Log ingestion and analytics
            - `Azure OpenAI` — OpenAI model deployments
            - `Virtual Machines` — IaaS compute
          example: "Azure App Service"
        serviceId:
          type: string
          description: Unique identifier for the Azure service
          example: "DZH317GT8G5N"
        serviceFamily:
          type: string
          description: |
            Broad category of the service. Common values:
            `Compute`, `Storage`, `Databases`, `Networking`,
            `AI + Machine Learning`, `Analytics`, `Security`,
            `Management and Governance`, `Web`, `Developer Tools`.
          example: "Compute"
        unitOfMeasure:
          type: string
          description: |
            The billing unit for the price. Common values:
            - `1 Hour` — per-hour billing (compute, databases)
            - `1/Hour` — alternate per-hour format (Cosmos DB RUs)
            - `1 GB` — per-gigabyte (log ingestion)
            - `1 GB/Month` — per-gigabyte per month (storage, retention)
            - `10K` — per 10,000 operations (Key Vault)
            - `1K` — per 1,000 units (Bot Service messages, Reranker searches)
            - `1` — per single unit (certificates, HSM keys)
          example: "1 Hour"
        type:
          type: string
          description: |
            The pricing type:
            - `Consumption` — Pay-as-you-go pricing (most common)
            - `Reservation` — 1-year or 3-year reserved instance pricing
            - `DevTestConsumption` — Dev/Test discounted pricing (requires Dev/Test subscription)
          enum:
            - Consumption
            - Reservation
            - DevTestConsumption
          example: "Consumption"
        isPrimaryMeterRegion:
          type: boolean
          description: |
            Whether this is the primary meter region. When `true`, this is the
            canonical price for this meter. Filter on `isPrimaryMeterRegion eq true`
            to avoid duplicate entries for the same meter across regions.
            Note: some services (like AI Search Basic) may have `false` in their
            only entry — do not filter by this field for all queries.
          example: true
        armSkuName:
          type: string
          description: |
            The ARM SKU name used in Azure Resource Manager templates/Bicep.
            May be empty for services that don't use ARM SKU names.
            Maps directly to the `sku.name` property in Bicep templates.
            Examples: `Azure_App_Service_Premium_v3_Plan_Linux_P0_v3`,
            `Standard_D2s_v3`. Often empty for PaaS services.
          example: "Azure_App_Service_Premium_v3_Plan_Linux_P0_v3"
        reservationTerm:
          type: string
          nullable: true
          description: |
            For reservation pricing only (`type: Reservation`). The reservation term.
            `null` or absent for consumption pricing.
          enum:
            - "1 Year"
            - "3 Years"
          example: "1 Year"
        savingsPlan:
          type: object
          nullable: true
          description: |
            Savings plan pricing details, if applicable. `null` when no savings
            plan is available for this SKU.
          properties:
            unitPrice:
              type: number
              format: double
              description: The savings plan unit price
            retailPrice:
              type: number
              format: double
              description: The savings plan retail price
            term:
              type: string
              description: "The savings plan term (e.g., `1 Year`, `3 Years`)"

    ErrorResponse:
      type: object
      description: Error response from the API
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code
              example: "BadRequest"
            message:
              type: string
              description: Human-readable error message
              example: "Invalid filter expression"

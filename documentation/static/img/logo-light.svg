<svg width="512" height="512" viewBox="0 0 512 512"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Background (optional, remove if not needed) -->
  <rect x="0" y="0" width="512" height="512" fill="white"/>

  <!-- Dinosaur body -->
  <g id="dino" transform="translate(90,60)">
    <!-- Body -->
    <ellipse cx="120" cy="150" rx="80" ry="90" fill="#3BBF7A"/>
    <!-- Belly -->
    <ellipse cx="120" cy="170" rx="55" ry="65" fill="#A7E6C3"/>
    <!-- Tail -->
    <path d="M 60 170 C 20 180 10 220 40 240 C 70 260 100 240 90 220 Z"
          fill="#3BBF7A"/>
    <!-- Neck -->
    <rect x="145" y="80" width="35" height="70" rx="15" fill="#3BBF7A"/>
    <!-- Head -->
    <circle cx="165" cy="70" r="45" fill="#3BBF7A"/>
    <!-- Eye -->
    <circle cx="178" cy="60" r="7" fill="white"/>
    <circle cx="178" cy="60" r="3" fill="#1F2933"/>
    <!-- Mouth -->
    <path d="M 150 85 Q 165 95 185 88" stroke="#1F2933" stroke-width="3" fill="none"/>

    <!-- Arm holding document -->
    <path d="M 110 135 Q 90 150 85 170" stroke="#2F9D63" stroke-width="10"
          stroke-linecap="round" fill="none"/>

    <!-- Document -->
    <g transform="translate(60,150)">
      <rect x="0" y="0" width="70" height="90" rx="6" fill="white" stroke="#D1D5DB" stroke-width="3"/>
      <!-- Folded corner -->
      <path d="M 70 0 L 50 0 L 70 20 Z" fill="#E5E7EB"/>
      <!-- Text lines -->
      <rect x="10" y="15" width="45" height="5" fill="#D1D5DB"/>
      <rect x="10" y="30" width="40" height="5" fill="#D1D5DB"/>
      <rect x="10" y="45" width="50" height="5" fill="#D1D5DB"/>
      <rect x="10" y="60" width="35" height="5" fill="#D1D5DB"/>
    </g>
  </g>

  <!-- Infinity loop with gear -->
  <g id="loop-gear" transform="translate(80,250)">
    <!-- Left loop -->
    <path d="M 80 60
             C 40 20 40 -20 80 -60
             C 120 -100 180 -100 220 -60
             L 200 -40
             C 170 -70 130 -70 100 -40
             C 70 -10 70 10 100 40
             C 130 70 170 70 200 40
             L 220 60
             C 180 100 120 100 80 60 Z"
          fill="#3BBF7A" opacity="0.9"/>

    <!-- Right loop -->
    <path d="M 260 60
             C 220 20 220 -20 260 -60
             C 300 -100 360 -100 400 -60
             C 440 -20 440 20 400 60
             C 360 100 300 100 260 60 Z"
          fill="#2FA866" opacity="0.9"/>

    <!-- Gear in center -->
    <g transform="translate(230,0)">
      <circle cx="0" cy="0" r="26" fill="#F9FAFB" stroke="#10B981" stroke-width="4"/>
      <!-- Teeth -->
      <g fill="#10B981">
        <rect x="-5" y="-40" width="10" height="12" rx="2"/>
        <rect x="-5" y="28" width="10" height="12" rx="2"/>
        <rect x="-40" y="-5" width="12" height="10" rx="2"/>
        <rect x="28" y="-5" width="12" height="10" rx="2"/>
      </g>
      <!-- Inner circle -->
      <circle cx="0" cy="0" r="10" fill="#D1FAE5"/>
    </g>
  </g>

  <!-- Text: DocusaurOps -->
  <text x="50%" y="460"
        text-anchor="middle"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="48"
        font-weight="700"
        fill="#111827">
    DocusaurOps
  </text>
</svg>

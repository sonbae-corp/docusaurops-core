name: Deploy DocusaurOps Site

permissions:
  id-token: write
  contents: read

on:

  workflow_call:
    inputs:
      app-name:
        description: 'Name of the DocusaurOps app (alphanumeric, hyphens, underscores only)'
        required: true
        type: string
      app-path:
        description: 'URL path for the app (without leading or trailing slash, e.g., "my-app")'
        required: false
        type: string
        default: '/'
      enable-auth:
        description: 'Enable authentication on the site'
        required: false
        type: boolean
        default: false
      action:
        description: 'Action to perform: deploy or rollback'
        required: false
        type: string
        default: 'deploy'
      documentation-path:
        description: 'Path to documentation folder to deploy (relative to repo root)'
        required: false
        type: string
        default: 'documentation'

jobs:
  validate:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:

      - name: Validate app-path
        run: |
          appPath="${{ inputs.app-path }}"
          if [[ "$appPath" != "/" && -n "$appPath" ]]; then
            if [[ ! "$appPath" =~ ^[a-z0-9][a-z0-9_\-]*[a-z0-9]$|^[a-z0-9]$ ]]; then
              echo "::error::Invalid app-path '$appPath'. Must be lowercase alphanumeric with hyphens or underscores only. No slashes, spaces, or uppercase letters."
              exit 1
            fi
          fi

  init:
    name: Load DocusaurOps environment configuration
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      ENV_AZURE_DEPLOY_LOCATION: ${{ steps.vars.outputs.ENV_AZURE_DEPLOY_LOCATION }}
      ENV_AZURE_DEPLOY_RESOURCE_PREFIX: ${{ steps.vars.outputs.ENV_AZURE_DEPLOY_RESOURCE_PREFIX }}
      ENV_AZURE_DEPLOY_TENANT_ID: ${{ steps.vars.outputs.ENV_AZURE_DEPLOY_TENANT_ID }}
      ENV_AZURE_ENV_NAME: ${{ steps.vars.outputs.ENV_AZURE_ENV_NAME }}
      ENV_AZURE_DOCUSAUROPS_ENTRA_ID_CLIENT_ID: ${{ steps.vars.outputs.ENV_AZURE_DOCUSAUROPS_ENTRA_ID_CLIENT_ID }}
      ENV_AZURE_DOCUSAUROPS_SITE_URL: ${{ steps.vars.outputs.ENV_AZURE_DOCUSAUROPS_SITE_URL }}
      ENV_AZURE_DOCUSAUROPS_ROOT_WEBAPP_NAME: ${{ steps.vars.outputs.ENV_AZURE_DOCUSAUROPS_ROOT_WEBAPP_NAME }}
    steps:
      - name: Load DocusaurOps environment variables
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DOCUSAUROPS_REPO_TOKEN }}
        run: |
          echo "Loading variables from repository '${{ vars.DOCUSAUROPS_HOST_REPO }}'..."
          gh variable list \
            --repo ${{ vars.DOCUSAUROPS_HOST_REPO }} \
            --json name,value \
            -q '.[] | "\(.name)=\(.value)"' | while IFS='=' read -r name value; do
              echo "$name=$value" >> $GITHUB_ENV
              echo "  $name=$value"
            done

      - name: Export outputs
        id: vars
        shell: bash
        run: |
          echo "ENV_AZURE_DEPLOY_LOCATION=$ENV_AZURE_DEPLOY_LOCATION" >> $GITHUB_OUTPUT
          echo "ENV_AZURE_ENV_NAME=$ENV_AZURE_ENV_NAME" >> $GITHUB_OUTPUT
          echo "ENV_AZURE_DOCUSAUROPS_ENTRA_ID_CLIENT_ID=$ENV_AZURE_DOCUSAUROPS_ENTRA_ID_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "ENV_AZURE_DOCUSAUROPS_SITE_URL=$ENV_AZURE_DOCUSAUROPS_SITE_URL" >> $GITHUB_OUTPUT
          echo "ENV_AZURE_DOCUSAUROPS_ROOT_WEBAPP_NAME=$ENV_AZURE_DOCUSAUROPS_ROOT_WEBAPP_NAME" >> $GITHUB_OUTPUT
          echo "ENV_AZURE_DEPLOY_TENANT_ID=$ENV_AZURE_DEPLOY_TENANT_ID" >> $GITHUB_OUTPUT
  deploy:
    name: Deploy DocusaurOps site (${{ inputs.app-name }})
    needs: init
    runs-on: ubuntu-latest
    outputs: 
      ENV_AZURE_DEPLOY_WEBAPP_NAME: ${{ steps.deployAzureStack.outputs.ENV_AZURE_DEPLOY_WEBAPP_NAME }}
      ENV_AZURE_DOCUSAUROPS_SITE_URL: ${{ steps.deployAzureStack.outputs.ENV_AZURE_DOCUSAUROPS_SITE_URL }}
    env:
      ENV_AZURE_DEPLOY_LOCATION: ${{ needs.init.outputs.ENV_AZURE_DEPLOY_LOCATION }}
      ENV_AZURE_ENV_NAME: ${{ needs.init.outputs.ENV_AZURE_ENV_NAME }}
      ENV_AZURE_DOCUSAUROPS_ENTRA_ID_CLIENT_ID: ${{ needs.init.outputs.ENV_AZURE_DOCUSAUROPS_ENTRA_ID_CLIENT_ID }}
      ENV_AZURE_DOCUSAUROPS_ROOT_WEBAPP_NAME: ${{ needs.init.outputs.ENV_AZURE_DOCUSAUROPS_ROOT_WEBAPP_NAME }}

    steps:
      - name: Checkout DocusaurOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DOCUSAUROPS_HOST_REPO }}
          token: ${{ secrets.DOCUSAUROPS_REPO_TOKEN }}
          fetch-depth: 0

      - name: Install Bicep
        shell: sh
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/download/v0.39.26/bicep-linux-x64
          chmod +x ./bicep
          sudo mv ./bicep /usr/local/bin/bicep

      - name: Install PowerShell Modules
        shell: pwsh
        run: |
          Install-Module Az.Accounts -RequiredVersion 5.3.4 -Force
          Install-Module Az.Resources -RequiredVersion 9.0.0  -Force
          Install-Module Az.Network -RequiredVersion 7.26.0 -Force
          Install-Module Az.Websites -RequiredVersion 3.4.2 -Force

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.DOCUSAUROPS_AZURE_DEPLOY_CREDS }}
          enable-AzPSSession: true

      - name: Deploy deployment stack for new site
        shell: pwsh
        id: deployAzureStack
        run: |
          $appPath = '${{ inputs.app-path }}'
          $enableAuth = '${{ inputs.enable-auth }}' -eq 'true'
          if ($appPath -and $appPath -ne '/') {
            ./deploy/deploy-site.ps1 -Env CI -AppName '${{ inputs.app-name }}' -AppPath $appPath -EnableAuthentication $enableAuth -Verbose
          } else {
            ./deploy/deploy-site.ps1 -Env CI -AppName '${{ inputs.app-name }}' -EnableAuthentication $enableAuth -Verbose
          }
          echo "ENV_AZURE_DEPLOY_WEBAPP_NAME=$env:ENV_AZURE_DEPLOY_WEBAPP_NAME" >> $env:GITHUB_OUTPUT
          echo "ENV_AZURE_DOCUSAUROPS_SITE_URL=$env:ENV_AZURE_DOCUSAUROPS_SITE_URL" >> $env:GITHUB_OUTPUT

  build:
    name: Build documentation
    runs-on: ubuntu-latest
    needs: [init, deploy]
    env:
      ENV_AZURE_DOCUSAUROPS_SITE_URL: ${{ needs.deploy.outputs.ENV_AZURE_DOCUSAUROPS_SITE_URL || needs.init.outputs.ENV_AZURE_DOCUSAUROPS_SITE_URL }}
    defaults:
      run:
        working-directory: ./${{ inputs.documentation-path }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |      
          npm ci

      - name: Build website
        env:
          ENV_BASE_URL: ${{ inputs.app-path }}
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ${{ github.workspace }}/${{ inputs.documentation-path }}/dist
    
  provision:
    name: Provision documentation (${{ inputs.app-name }} to ${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: [init,deploy,build]
    env:
      ENV_AZURE_DEPLOY_WEBAPP_NAME: ${{ needs.deploy.outputs.ENV_AZURE_DEPLOY_WEBAPP_NAME }}
      ENV_AZURE_DEPLOY_STACK_RG_NAME: "rg-docusaurops-${{ needs.init.outputs.ENV_AZURE_ENV_NAME }}"
      ENV_AZURE_DOCUSAUROPS_SITE_URL: ${{ needs.deploy.outputs.ENV_AZURE_DOCUSAUROPS_SITE_URL || needs.init.outputs.ENV_AZURE_DOCUSAUROPS_SITE_URL }}
    steps:   
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ${{ github.workspace }}/${{ inputs.documentation-path }}/dist

      - name: Install Azure CLI
        shell: bash
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.DOCUSAUROPS_AZURE_DEPLOY_CREDS }}
          enable-AzPSSession: true
                    
      - name: Deploy app service code
        working-directory: ${{ github.workspace }}/${{ inputs.documentation-path }}/dist
        shell: pwsh
        run: |
          Compress-Archive * -DestinationPath app.zip -Force

          if (-not (Test-Path -Path app.zip)) {
              throw "The deployment package 'app.zip' was not created successfully."
          }

          Write-Verbose "Deploying App Service code to '$env:ENV_AZURE_DEPLOY_WEBAPP_NAME'..."

          az webapp deploy --resource-group $env:ENV_AZURE_DEPLOY_STACK_RG_NAME --name $env:ENV_AZURE_DEPLOY_WEBAPP_NAME --type zip --src-path app.zip --restart --clean true --debug --track-status false

          Write-Verbose "Restarting App Service '$env:ENV_AZURE_DEPLOY_WEBAPP_NAME'..."
          az webapp restart --resource-group $env:ENV_AZURE_DEPLOY_STACK_RG_NAME --name $env:ENV_AZURE_DEPLOY_WEBAPP_NAME

      - name: Output deployed site URL
        shell: bash
        run: |
          baseUrl="${ENV_AZURE_DOCUSAUROPS_SITE_URL}"
          appPath="${{ inputs.app-path }}"

          # Normalize values to avoid malformed URLs with duplicated slashes.
          baseUrl="${baseUrl%/}"
          if [[ -z "$appPath" || "$appPath" == "/" ]]; then
            finalUrl="${baseUrl}/"
          else
            appPath="${appPath#/}"
            appPath="${appPath%/}"
            finalUrl="${baseUrl}/${appPath}"
          fi

          echo "Deployed site URL: $finalUrl"
          echo "::notice title=Deployed DocusaurOps Site::$finalUrl"
          echo "### Deployed DocusaurOps Site" >> "$GITHUB_STEP_SUMMARY"
          echo "[$finalUrl]($finalUrl)" >> "$GITHUB_STEP_SUMMARY"
